<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background -->
  <rect width="100" height="100" fill="#1C1C1C" rx="8"/>

  <!-- Gold "1" with house/roof shape -->
  <!-- Roof peak going left-up then right-down, like a house roof forming the top of "1" -->
  <polygon points="12,52 26,22 36,34 36,34" fill="#C9A84C"/>
  <!-- Stem of "1" -->
  <rect x="26" y="30" width="11" height="46" fill="#C9A84C"/>
  <!-- Base serif of "1" -->
  <rect x="18" y="74" width="19" height="7" fill="#C9A84C"/>

  <!-- Red vertical bar (divider) -->
  <rect x="42" y="22" width="8" height="57" fill="#8B1A2A"/>

  <!-- White "P" -->
  <text x="51" y="79" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="58" fill="white">P</text>
</svg>
